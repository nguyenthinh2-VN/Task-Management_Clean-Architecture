# =============================================
# Task Management - Application Properties
# S? d?ng environment variables t? file .env
# =============================================

# Server Configuration
server.port=${PORT:8080}

# Database Configuration (s? d?ng environment variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver




# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Resend API Key (l?y t? https://resend.com)
RESEND_API_KEY=${RESEND_API_KEY}

# Email g?i ?i
app.email.from=${APP_EMAIL_FROM}

# Frontend URL ?? redirect sau verify
app.frontend.url=${APP_FRONTEND_URL}

# Logging Configuration
logging.level.com.example.task_management=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Application Configuration
spring.application.name=Task Management System
spring.profiles.active=${SPRING_PROFILES_ACTIVE}


# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=NON_NULL

# Google OAuth Configuration
google.client-id=${GOOGLE_CLIENT_ID:940090065833-lucvnncjjmqosi7cn7d4p3bg93ap4br3.apps.googleusercontent.com}
