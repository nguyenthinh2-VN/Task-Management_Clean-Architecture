<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login Test</title>
    <!-- Add Google Identity Services library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            background-color: #f4f7f6;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        #response-container {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
            max-width: 500px;
            background-color: #272822;
            color: #f8f8f2;
            text-align: left;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }

        .warning {
            color: red;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Test Google Login API</h2>

        <p class="warning">LƯU Ý: Thay YOUR_GOOGLE_CLIENT_ID trong HTML bằng Client ID thực tế của bạn!</p>

        <!-- Trình hiển thị UI Nút Google chuẩn -->
        <!-- ĐIỀN GOOGLE CLIENT ID VÀO data-client_id -->
        <div id="g_id_onload" data-client_id="940090065833-lucvnncjjmqosi7cn7d4p3bg93ap4br3.apps.googleusercontent.com"
            data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
            data-auto_prompt="false">
        </div>

        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
            data-text="signin_with" data-size="large" data-logo_alignment="center">
        </div>

        <div id="response-container">
            <h3>Server Response:</h3>
            <pre id="response-output">Chưa có dữ liệu. Vui lòng bấm vào đăng nhập Google...</pre>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            document.getElementById('response-output').innerText = "Đang gửi ID Token lên Server (/api/auth/login/google)...\nXin chờ...";

            // Bắn ID Token (credential) trực tiếp lên Controller của Spring Boot
            fetch('/api/auth/login/google', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ idToken: response.credential })
            })
                .then(res => {
                    // Kiểm tra status HTTP trước để bắt lỗi 429 Rate Limit (nếu có)
                    if (!res.ok) {
                        console.log("HTTP Error:", res.status);
                    }
                    return res.json();
                })
                .then(data => {
                    console.log("Success:", data);
                    // Hiển thị ra màn hình nguyên cục JSON trả về
                    document.getElementById('response-output').innerText = JSON.stringify(data, null, 2);
                })
                .catch((error) => {
                    console.error('Error:', error);
                    document.getElementById('response-output').innerText = "Lỗi khi gọi API: " + error;
                });
        }
    </script>
</body>

</html>
