server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    com.example.task_management: INFO
    org.springframework.security: WARN

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}

app:
  email:
    from: ${APP_EMAIL_FROM}
  frontend:
    url: ${APP_FRONTEND_URL}

google:
  client-id: ${GOOGLE_CLIENT_ID}

RESEND_API_KEY: ${RESEND_API_KEY}